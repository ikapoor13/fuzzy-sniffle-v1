<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>migrate entries</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF; --bg2: #EFEBE3; --bg3: #E8E2D9;
    --ink: #1C1917; --ink2: #57534E; --ink3: #A8A29E;
    --accent: #2D6A4F; --border: rgba(28,25,23,0.1); --border2: rgba(28,25,23,0.06);
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; font-weight: 300; padding: 40px 32px; max-width: 860px; margin: 0 auto; }
  h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-style: italic; margin-bottom: 8px; }
  .sub { font-size: 14px; color: var(--ink2); line-height: 1.7; margin-bottom: 32px; }
  .btn { padding: 10px 24px; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; border: 1px solid var(--border); }
  .btn-primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn-primary:hover { background: var(--ink2); }
  .btn-ghost { background: transparent; color: var(--ink2); }
  .btn-ghost:hover { background: var(--bg2); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
  .status-line { font-size: 13px; color: var(--ink3); }
  .progress { height: 2px; background: var(--bg3); border-radius: 2px; margin-bottom: 32px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); transition: width 0.4s; }
  .entry-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; }
  .entry-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 12px; }
  .entry-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .entry-cat { font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink3); }
  .entry-subcat { font-size: 10px; color: var(--ink3); }
  .entry-body-preview { font-size: 13px; color: var(--ink3); line-height: 1.6; margin-bottom: 16px; padding: 12px; background: var(--bg2); border-radius: var(--radius-sm); max-height: 80px; overflow: hidden; position: relative; }
  .entry-body-preview::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 24px; background: linear-gradient(transparent, var(--bg2)); }
  .field-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); font-weight: 500; margin-bottom: 6px; display: block; }
  .field-input { width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; outline: none; transition: border 0.15s; line-height: 1.6; resize: none; min-height: 60px; }
  .field-input:focus { border-color: var(--ink2); }
  .field-group { margin-bottom: 12px; }
  .entry-status { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
  .status-pending { background: var(--bg2); color: var(--ink3); }
  .status-generating { background: #FFF8E6; color: #8A5B00; }
  .status-ready { background: #E8F5EE; color: #2D6A4F; }
  .status-saved { background: #E8F5EE; color: #2D6A4F; opacity: 0.6; }
  .status-error { background: #FEF2F2; color: #C0392B; }
  .status-skipped { background: var(--bg2); color: var(--ink3); opacity: 0.5; }
  .duplicate-flag { font-size: 11px; color: #C0392B; background: #FEF2F2; padding: 3px 10px; border-radius: 99px; }
  .save-bar { position: sticky; bottom: 0; background: var(--bg); border-top: 1px solid var(--border2); padding: 16px 0; margin-top: 32px; display: flex; align-items: center; gap: 16px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: var(--bg); padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .empty { text-align: center; padding: 60px 20px; color: var(--ink3); font-size: 14px; }
  .section-divider { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin: 24px 0 12px; font-weight: 500; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<h1>entry migration</h1>
<p class="sub">This tool fetches all your entries, uses Claude to generate a <strong>core message</strong> and <strong>takeaway</strong> for each, and lets you review and edit before saving. Duplicates are flagged automatically.</p>

<div class="controls">
  <button class="btn btn-primary" id="fetch-btn" onclick="fetchAndGenerate()">fetch & generate</button>
  <button class="btn btn-ghost" id="save-btn" onclick="saveAll()" style="display:none">save all reviewed</button>
  <span class="status-line" id="status-line">ready</span>
</div>

<div class="progress" id="progress-wrap" style="display:none">
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</div>

<div id="entries-container"></div>

<script>
const SUPABASE_URL = 'https://yanflhgzvutghpazkxlc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nXSYyFTnk4G11nI0VHjW_w_mEFOPJwi';

const CAT_LABELS = {
  spirituality: 'spirituality', about: 'about me', relationships: 'relationships',
  tv: 'tv & content', observations: 'observations', revisit: 'worth revisiting'
};

let allEntries = [];
let generated = {};

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function setStatus(msg) {
  document.getElementById('status-line').textContent = msg;
}

function setProgress(pct) {
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('progress-bar').style.width = pct + '%';
}

async function dbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || 'return=representation',
      ...options.headers
    },
    ...options
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

function detectDuplicates(entries) {
  const seen = {};
  const dupeIds = new Set();
  entries.forEach(e => {
    const key = (e.body || '').trim().slice(0, 80);
    if (seen[key]) dupeIds.add(e.id);
    else seen[key] = e.id;
  });
  return dupeIds;
}

async function generateForEntry(entry) {
  const prompt = `You are helping someone build a personal growth journal. Given this journal entry, generate two things:

1. core_message: One sentence (max 20 words) capturing the essential insight — the "so what" of this entry.
2. takeaway: One sentence (max 20 words) as a personal application for Ishaan — what this means for him specifically, written in second person ("You...").

Entry category: ${CAT_LABELS[entry.category] || entry.category}
Entry subcategory: ${entry.subcat || ''}
Entry body: ${entry.body}

Respond ONLY with valid JSON, no markdown, no preamble:
{"core_message": "...", "takeaway": "..."}`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  const data = await response.json();
  const text = data.content?.[0]?.text || '{}';
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

async function fetchAndGenerate() {
  const btn = document.getElementById('fetch-btn');
  btn.disabled = true;
  setStatus('fetching entries...');
  setProgress(5);

  try {
    const entries = await dbFetch('entries?order=created_at.desc');
    allEntries = entries.filter(e => !e.type);
    const dupeIds = detectDuplicates(allEntries);

    setStatus(`found ${allEntries.length} entries — generating...`);
    setProgress(10);

    const container = document.getElementById('entries-container');
    container.innerHTML = '';

    for (let i = 0; i < allEntries.length; i++) {
      const e = allEntries[i];
      const isDupe = dupeIds.has(e.id);
      const alreadyHas = e.core_message && e.takeaway;

      renderEntryCard(e, isDupe, alreadyHas ? { core_message: e.core_message, takeaway: e.takeaway } : null, 'pending');

      setProgress(10 + ((i / allEntries.length) * 40));
    }

    // Now generate for entries that don't have values yet
    const toGenerate = allEntries.filter(e => !e.core_message || !e.takeaway).filter(e => !dupeIds.has(e.id));
    setStatus(`generating for ${toGenerate.length} entries...`);

    for (let i = 0; i < toGenerate.length; i++) {
      const e = toGenerate[i];
      updateCardStatus(e.id, 'generating');
      try {
        const result = await generateForEntry(e);
        generated[e.id] = result;
        updateCardFields(e.id, result);
        updateCardStatus(e.id, 'ready');
      } catch(err) {
        updateCardStatus(e.id, 'error');
      }
      setProgress(50 + ((i / toGenerate.length) * 45));
      await new Promise(r => setTimeout(r, 300));
    }

    // Mark already-has entries as ready
    allEntries.filter(e => e.core_message && e.takeaway && !dupeIds.has(e.id)).forEach(e => {
      generated[e.id] = { core_message: e.core_message, takeaway: e.takeaway };
      updateCardStatus(e.id, 'ready');
    });

    setProgress(100);
    setStatus(`done — review and save`);
    document.getElementById('save-btn').style.display = 'inline-block';
    btn.textContent = 'regenerate';
    btn.disabled = false;

  } catch(err) {
    setStatus('error: ' + err.message);
    btn.disabled = false;
  }
}

function renderEntryCard(e, isDupe, existing, status) {
  const container = document.getElementById('entries-container');
  const div = document.createElement('div');
  div.className = 'entry-card';
  div.id = 'card_' + e.id;

  const cm = existing?.core_message || '';
  const tk = existing?.takeaway || '';

  div.innerHTML = `
    <div class="entry-header">
      <div>
        <div class="entry-meta" style="margin-bottom:6px">
          <span class="entry-cat">${CAT_LABELS[e.category] || e.category}</span>
          ${e.subcat ? `<span class="entry-subcat">· ${e.subcat}</span>` : ''}
          <span class="entry-date" style="font-size:11px;color:var(--ink3)">${e.date || ''}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        ${isDupe ? `<span class="duplicate-flag">duplicate — will skip</span>` : ''}
        <span class="entry-status status-${status}" id="status_${e.id}">${status}</span>
      </div>
    </div>
    <div class="entry-body-preview">${(e.body || '').slice(0, 200)}</div>
    ${!isDupe ? `
    <div class="field-group">
      <label class="field-label">core message</label>
      <textarea class="field-input" id="cm_${e.id}" placeholder="generating...">${cm}</textarea>
    </div>
    <div class="field-group">
      <label class="field-label">takeaway for you</label>
      <textarea class="field-input" id="tk_${e.id}" placeholder="generating...">${tk}</textarea>
    </div>
    ` : ''}
  `;
  container.appendChild(div);
}

function updateCardStatus(id, status) {
  const el = document.getElementById('status_' + id);
  if (!el) return;
  el.className = 'entry-status status-' + status;
  el.textContent = status;
}

function updateCardFields(id, result) {
  const cm = document.getElementById('cm_' + id);
  const tk = document.getElementById('tk_' + id);
  if (cm) cm.value = result.core_message || '';
  if (tk) tk.value = result.takeaway || '';
}

async function saveAll() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  const dupeIds = detectDuplicates(allEntries);
  const toSave = allEntries.filter(e => !dupeIds.has(e.id));

  let saved = 0;
  for (const e of toSave) {
    const cmEl = document.getElementById('cm_' + e.id);
    const tkEl = document.getElementById('tk_' + e.id);
    if (!cmEl || !tkEl) continue;

    const core_message = cmEl.value.trim();
    const takeaway = tkEl.value.trim();
    if (!core_message || !takeaway) continue;

    try {
      await dbFetch(`entries?id=eq.${e.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ core_message, takeaway }),
        prefer: 'return=minimal'
      });
      updateCardStatus(e.id, 'saved');
      saved++;
    } catch(err) {
      updateCardStatus(e.id, 'error');
    }
  }

  setStatus(`${saved} entries saved to Supabase`);
  toast(`${saved} entries updated`);
  btn.disabled = false;
}
</script>
</body>
</html>
